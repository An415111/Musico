<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In - Musico</title>
  <link rel="stylesheet" href="signin.css"/>
</head>
<body>
  <main>
    <div class="form-box">
      <h2>Sign In</h2>
      <form id="signin-form">
        <input type="email" id="signinEmail" placeholder="Email" required/>
        <div class="password-wrapper">
          <input type="password" id="signinPassword" placeholder="Password" required/>
          <span class="toggle-password" id="toggleSignInPassword">👁️</span>
        </div>

        <button type="submit">Sign In</button>
        
        <a href="Forget Password.html" style="color:lightblue;">Forgot Password?</a>  
        <p>Don't have an account? <a href="signup.html" style="color:lightblue;">Sign Up</a></p>

      </form>
    </div>
  </main>  
  <script src="signin.js" defer></script>
              
</body>
</html>
