<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password - Musico</title>
  <link rel="stylesheet" href="forgot_password.css"/>
</head>
<body>
  <div class="form-box">
    <h2>Forgot Password</h2>

    <!-- Step 1: Enter Email -->
    <form id="forgotForm">
      <input type="email" id="forgotEmail" placeholder="Enter your registered email" required/>
      <button type="submit">Send OTP</button>
      <p id="forgotStatus"></p>
    </form>

    <!-- Step 2: OTP + New Password -->
    <form id="resetForm" style="display:none;">
      <input type="text" id="resetOtp" placeholder="Enter OTP" required/>

      <div class="password-container">
        <input type="password" id="newPassword" placeholder="Enter new password" required/>
        <span id="toggleNewPass" class="eye">👁️</span>
      </div>

      <button type="submit">Reset Password</button>

      <!-- 🔁 Resend Section -->
      <p id="resendWrapper" style="margin-top:10px; display:none;">
        Didn’t receive OTP?
        <button type="button" id="resendBtn"
          style="background:none;border:none;color:lightblue;cursor:pointer;">
          Resend OTP
        </button>
        <span id="resendTimer" style="color:gray;"></span>
      </p>

      <p id="resetStatus"></p>
    </form>

    <a href="signin.html">Back to Sign In</a>
  </div>

  <script src="forgot_password.js"></script>
</body>
</html>
